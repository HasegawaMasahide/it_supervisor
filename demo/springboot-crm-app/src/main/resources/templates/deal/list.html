<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>商談一覧 - CRM</title>
    <link rel="stylesheet" href="https://cdn.example.com/bootstrap.css">
    <script src="https://cdn.example.com/jquery.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>商談一覧</h1>

        <!-- パイプライン表示 -->
        <div class="pipeline">
            <div th:each="stage : ${stages}" class="stage-column">
                <!-- ISSUE: th:utextでXSS -->
                <h3 th:utext="${stage.name}">ステージ名</h3>
                <div class="stage-deals">
                    <div th:each="deal : ${stage.deals}" class="deal-card">
                        <!-- ISSUE: XSS脆弱性 -->
                        <h4 th:utext="${deal.title}"></h4>
                        <p>金額: <span th:text="${deal.amount}"></span>円</p>
                        <p>顧客: <span th:utext="${deal.customer.companyName}"></span></p>
                        <p>確度: <span th:text="${deal.probability}"></span>%</p>
                        <!-- ISSUE: 締切日のXSS -->
                        <p>締切: <span th:utext="${deal.expectedCloseDate}"></span></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 商談一覧テーブル -->
        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>商談名</th>
                    <th>顧客</th>
                    <th>金額</th>
                    <th>ステージ</th>
                    <th>確度</th>
                    <th>締切日</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="deal : ${deals}">
                    <td th:text="${deal.id}"></td>
                    <!-- ISSUE: XSS -->
                    <td th:utext="${deal.title}"></td>
                    <td th:utext="${deal.customer.companyName}"></td>
                    <!-- ISSUE: 金額フォーマットなし -->
                    <td th:text="${deal.amount}"></td>
                    <td th:text="${deal.stage}"></td>
                    <td th:text="${deal.probability}">%</td>
                    <td th:text="${#dates.format(deal.expectedCloseDate, 'yyyy-MM-dd')}"></td>
                    <td>
                        <a th:href="@{/deals/{id}(id=${deal.id})}">詳細</a>
                        <!-- ISSUE: GETで削除 -->
                        <a th:href="@{/deals/delete/{id}(id=${deal.id})}"
                           onclick="return confirm('削除しますか？')">削除</a>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- ISSUE: ページネーションなし -->

        <!-- 新規商談フォーム -->
        <!-- ISSUE: CSRFトークンなし -->
        <form th:action="@{/deals/create}" method="POST" id="dealForm">
            <h3>新規商談登録</h3>

            <div class="form-group">
                <label>商談名</label>
                <input type="text" name="title" class="form-control" required>
            </div>

            <div class="form-group">
                <label>顧客</label>
                <!-- ISSUE: 全顧客をセレクトボックスに表示（大量データ） -->
                <select name="customerId" class="form-control">
                    <option th:each="customer : ${allCustomers}"
                            th:value="${customer.id}"
                            th:utext="${customer.companyName}"></option>
                </select>
            </div>

            <div class="form-group">
                <label>金額</label>
                <!-- ISSUE: 数値バリデーションなし -->
                <input type="text" name="amount" class="form-control">
            </div>

            <div class="form-group">
                <label>ステージ</label>
                <select name="stage" class="form-control">
                    <!-- ISSUE: ステージがハードコード -->
                    <option value="lead">リード</option>
                    <option value="proposal">提案</option>
                    <option value="negotiation">交渉</option>
                    <option value="closed_won">成約</option>
                    <option value="closed_lost">失注</option>
                </select>
            </div>

            <div class="form-group">
                <label>確度 (%)</label>
                <!-- ISSUE: 範囲バリデーションなし -->
                <input type="number" name="probability" class="form-control">
            </div>

            <div class="form-group">
                <label>締切日</label>
                <input type="date" name="expectedCloseDate" class="form-control">
            </div>

            <div class="form-group">
                <label>メモ</label>
                <textarea name="notes" class="form-control"></textarea>
            </div>

            <button type="submit" class="btn btn-primary">登録</button>
        </form>
    </div>

    <!-- ISSUE: インラインスクリプト -->
    <script th:inline="javascript">
        /*<![CDATA[*/
        var deals = /*[[${deals}]]*/ [];
        var totalAmount = /*[[${totalAmount}]]*/ 0;

        // ISSUE: グローバル変数
        window.crmData = {
            deals: deals,
            total: totalAmount
        };

        // ISSUE: 動的HTML生成（XSS）
        function renderDealCard(deal) {
            return '<div class="deal-card">' +
                   '<h4>' + deal.title + '</h4>' +  // XSS
                   '<p>金額: ' + deal.amount + '円</p>' +
                   '</div>';
        }

        // ISSUE: URLパラメータをそのまま使用
        $(document).ready(function() {
            var params = new URLSearchParams(window.location.search);
            var filter = params.get('filter');
            if (filter) {
                // ISSUE: DOM XSS
                $('#filter-display').html('フィルター: ' + filter);
            }
        });
        /*]]>*/
    </script>

    <div id="filter-display"></div>
</body>
</html>
