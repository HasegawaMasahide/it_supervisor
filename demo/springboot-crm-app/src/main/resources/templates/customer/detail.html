<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>顧客詳細 - CRM</title>
    <link rel="stylesheet" href="https://cdn.example.com/bootstrap.css">
</head>
<body>
    <div class="container">
        <h1>顧客詳細</h1>

        <div class="card">
            <div class="card-body">
                <!-- ISSUE: th:utextでXSS脆弱性 -->
                <h2 th:utext="${customer.companyName}">会社名</h2>

                <dl>
                    <dt>担当者</dt>
                    <!-- ISSUE: エスケープなし -->
                    <dd th:utext="${customer.contactName}"></dd>

                    <dt>メールアドレス</dt>
                    <dd th:utext="${customer.email}"></dd>

                    <dt>電話番号</dt>
                    <dd th:text="${customer.phone}"></dd>

                    <dt>住所</dt>
                    <!-- ISSUE: 住所もエスケープなし -->
                    <dd th:utext="${customer.address}"></dd>

                    <dt>業種</dt>
                    <dd th:text="${customer.industry}"></dd>

                    <dt>メモ</dt>
                    <!-- ISSUE: メモ欄でXSS -->
                    <dd th:utext="${customer.notes}"></dd>

                    <dt>クレジットカード</dt>
                    <!-- ISSUE: クレジットカード情報を表示 -->
                    <dd th:text="${customer.creditCardNumber}">****-****-****-****</dd>
                </dl>
            </div>
        </div>

        <!-- 編集フォーム -->
        <!-- ISSUE: CSRFトークンなし -->
        <form th:action="@{/customers/update}" method="POST">
            <input type="hidden" name="id" th:value="${customer.id}">

            <div class="form-group">
                <label>会社名</label>
                <input type="text" name="companyName" th:value="${customer.companyName}" class="form-control">
            </div>

            <div class="form-group">
                <label>担当者名</label>
                <input type="text" name="contactName" th:value="${customer.contactName}" class="form-control">
            </div>

            <div class="form-group">
                <label>メール</label>
                <!-- ISSUE: type="email"バリデーションなし -->
                <input type="text" name="email" th:value="${customer.email}" class="form-control">
            </div>

            <div class="form-group">
                <label>電話</label>
                <input type="text" name="phone" th:value="${customer.phone}" class="form-control">
            </div>

            <div class="form-group">
                <label>クレジットカード番号</label>
                <!-- ISSUE: クレジットカード番号を平文で入力 -->
                <input type="text" name="creditCardNumber" th:value="${customer.creditCardNumber}" class="form-control">
            </div>

            <div class="form-group">
                <label>メモ</label>
                <!-- ISSUE: テキストエリアもXSS対象 -->
                <textarea name="notes" class="form-control" th:utext="${customer.notes}"></textarea>
            </div>

            <button type="submit" class="btn btn-primary">更新</button>
        </form>

        <!-- 活動履歴 -->
        <h3>活動履歴</h3>
        <table class="table">
            <thead>
                <tr>
                    <th>日時</th>
                    <th>種類</th>
                    <th>内容</th>
                    <th>担当者</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="activity : ${customer.activities}">
                    <td th:text="${#dates.format(activity.activityDate, 'yyyy-MM-dd HH:mm')}"></td>
                    <td th:text="${activity.activityType}"></td>
                    <!-- ISSUE: XSS脆弱性 -->
                    <td th:utext="${activity.description}"></td>
                    <td th:text="${activity.performedBy}"></td>
                </tr>
            </tbody>
        </table>

        <!-- ISSUE: 削除もCSRFトークンなし、GETリクエスト -->
        <a th:href="@{/customers/delete/{id}(id=${customer.id})}"
           class="btn btn-danger"
           onclick="return confirm('本当に削除しますか？この操作は取り消せません。')">
            この顧客を削除
        </a>

        <a href="/customers" class="btn btn-secondary">一覧に戻る</a>
    </div>

    <!-- ISSUE: インラインスクリプト -->
    <script th:inline="javascript">
        /*<![CDATA[*/
        var customerId = /*[[${customer.id}]]*/ 0;
        var customerData = /*[[${customer}]]*/ {};

        // ISSUE: JSONをそのまま埋め込み（XSS）
        console.log('Customer loaded:', customerData);
        /*]]>*/
    </script>
</body>
</html>
