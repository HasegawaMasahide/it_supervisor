<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>顧客一覧 - CRM</title>
    <!-- ISSUE: CDNからの外部リソース読み込み（CSP違反） -->
    <link rel="stylesheet" href="https://cdn.example.com/bootstrap.css">
    <script src="https://cdn.example.com/jquery.min.js"></script>
    <style>
        /* ISSUE: インラインスタイル（CSP違反） */
        .customer-row { cursor: pointer; }
        .delete-btn { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <h1>顧客一覧</h1>

        <!-- ISSUE: 検索フォームにCSRFトークンなし -->
        <form action="/customers/search" method="GET">
            <input type="text" name="keyword" th:value="${keyword}">
            <button type="submit">検索</button>
        </form>

        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>会社名</th>
                    <th>担当者</th>
                    <th>メール</th>
                    <th>電話</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <!-- ISSUE: th:utextでXSS脆弱性 -->
                <tr th:each="customer : ${customers}" class="customer-row">
                    <td th:text="${customer.id}"></td>
                    <!-- ISSUE: th:utextはエスケープしないためXSS脆弱性 -->
                    <td th:utext="${customer.companyName}"></td>
                    <td th:utext="${customer.contactName}"></td>
                    <td th:utext="${customer.email}"></td>
                    <td th:text="${customer.phone}"></td>
                    <td>
                        <a th:href="@{/customers/{id}(id=${customer.id})}">詳細</a>
                        <!-- ISSUE: GETでの削除（CSRFトークンなし） -->
                        <a th:href="@{/customers/delete/{id}(id=${customer.id})}"
                           class="delete-btn"
                           onclick="return confirm('削除しますか？')">削除</a>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- ISSUE: ページネーションなし（全件表示） -->
        <p>全 <span th:text="${#lists.size(customers)}"></span> 件</p>

        <!-- ISSUE: インラインJavaScript（CSP違反） -->
        <script th:inline="javascript">
            /*<![CDATA[*/
            // ISSUE: ユーザー入力をそのままJSに埋め込み
            var keyword = /*[[${keyword}]]*/ '';
            var customers = /*[[${customers}]]*/ [];

            // ISSUE: evalの使用
            function executeAction(action) {
                eval(action);
            }

            // ISSUE: DOM XSS
            $(document).ready(function() {
                var hash = window.location.hash.substring(1);
                if (hash) {
                    // ISSUE: ハッシュ値を直接HTML挿入
                    $('#message').html(decodeURIComponent(hash));
                }
            });
            /*]]>*/
        </script>

        <div id="message"></div>
    </div>
</body>
</html>
