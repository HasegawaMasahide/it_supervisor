<!DOCTYPE html>
<html>
<head>
    <title>Product List</title>
</head>
<body>
    <h1>Products</h1>

    <form action="{% url 'product_search' %}" method="get">
        <!-- 問題: XSS脆弱性 - safe filterの不適切使用 -->
        <input type="text" name="q" placeholder="Search products...">
        <button type="submit">Search</button>
    </form>

    <div class="products">
        {% for product in products %}
            <div class="product">
                <h2>{{ product.name }}</h2>
                <!-- 問題: XSS脆弱性 - descriptionをエスケープせずに表示 -->
                <p>{{ product.description|safe }}</p>
                <p>Price: ${{ product.price }}</p>
                <!-- 問題: N+1クエリ - review_countプロパティを呼び出し -->
                <p>Reviews: {{ product.review_count }}</p>
                <p>Rating: {{ product.average_rating }}</p>
                <a href="{% url 'product_detail' product.id %}">View Details</a>
            </div>
        {% endfor %}
    </div>
</body>
</html>
