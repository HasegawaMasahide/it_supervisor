version: '3.9'

services:
  # ===========================================
  # メインアプリケーション
  # ===========================================
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: it-supervisor-app
    volumes:
      # ツール群（開発時は書き込み可能、本番は読み取り専用）
      - ./tools:/app/tools:delegated
      # データ永続化
      - ./data:/app/data:delegated
      # レポート出力
      - ./reports:/app/reports:delegated
      # 顧客リポジトリ（分析対象）
      - customer-repos:/app/repos:delegated
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/it_supervisor
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=debug
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - it-supervisor-network
    # デフォルトではシェルで待機（手動でコマンド実行）
    command: ["sh", "-c", "npm install && tail -f /dev/null"]

  # ===========================================
  # PostgreSQL データベース
  # ===========================================
  db:
    image: postgres:16-alpine
    container_name: it-supervisor-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: it_supervisor
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    volumes:
      # データ永続化
      - postgres-data:/var/lib/postgresql/data
      # 初期化スクリプト
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      # カスタム設定（オプション）
      # - ./docker/db/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    ports:
      - "5432:5432"
    networks:
      - it-supervisor-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===========================================
  # Redis（分析ジョブのキュー管理）
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: it-supervisor-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - it-supervisor-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ===========================================
  # 静的解析ツール: ESLint
  # ===========================================
  analyzer-eslint:
    build:
      context: .
      dockerfile: docker/analyzers/eslint.Dockerfile
    container_name: it-supervisor-analyzer-eslint
    volumes:
      - customer-repos:/repos:ro
      - ./reports:/reports:delegated
    networks:
      - it-supervisor-network
    # 待機状態（必要時にdocker-compose execで実行）
    command: ["sleep", "infinity"]

  # ===========================================
  # 静的解析ツール: PHP_CodeSniffer
  # ===========================================
  analyzer-phpcs:
    build:
      context: .
      dockerfile: docker/analyzers/phpcs.Dockerfile
    container_name: it-supervisor-analyzer-phpcs
    volumes:
      - customer-repos:/repos:ro
      - ./reports:/reports:delegated
    networks:
      - it-supervisor-network
    command: ["sleep", "infinity"]

  # ===========================================
  # 静的解析ツール: PHPStan
  # ===========================================
  analyzer-phpstan:
    build:
      context: .
      dockerfile: docker/analyzers/phpstan.Dockerfile
    container_name: it-supervisor-analyzer-phpstan
    volumes:
      - customer-repos:/repos:ro
      - ./reports:/reports:delegated
    networks:
      - it-supervisor-network
    command: ["sleep", "infinity"]

  # ===========================================
  # セキュリティスキャナー: Snyk
  # ===========================================
  analyzer-snyk:
    build:
      context: .
      dockerfile: docker/analyzers/snyk.Dockerfile
    container_name: it-supervisor-analyzer-snyk
    environment:
      - SNYK_TOKEN=${SNYK_TOKEN:-}
    volumes:
      - customer-repos:/repos:ro
      - ./reports:/reports:delegated
    networks:
      - it-supervisor-network
    command: ["sleep", "infinity"]

  # ===========================================
  # SonarQube（オプション: 高度な静的解析）
  # ===========================================
  # 注意: リソース消費が大きいため、必要に応じてコメントアウト解除
  # sonarqube:
  #   image: sonarqube:10-community
  #   container_name: it-supervisor-sonarqube
  #   environment:
  #     - SONAR_JDBC_URL=jdbc:postgresql://db:5432/sonarqube
  #     - SONAR_JDBC_USERNAME=postgres
  #     - SONAR_JDBC_PASSWORD=postgres
  #   volumes:
  #     - sonarqube-data:/opt/sonarqube/data
  #     - sonarqube-extensions:/opt/sonarqube/extensions
  #     - sonarqube-logs:/opt/sonarqube/logs
  #   ports:
  #     - "9000:9000"
  #   networks:
  #     - it-supervisor-network
  #   depends_on:
  #     - db

  # ===========================================
  # pgAdmin（オプション: データベース管理UI）
  # ===========================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: it-supervisor-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@it-supervisor.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - it-supervisor-network
    depends_on:
      - db
    profiles:
      - tools  # docker-compose --profile tools up で起動

# ===========================================
# 名前付きボリューム
# ===========================================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  customer-repos:
    driver: local
  # sonarqube-data:
  #   driver: local
  # sonarqube-extensions:
  #   driver: local
  # sonarqube-logs:
  #   driver: local
  pgadmin-data:
    driver: local

# ===========================================
# ネットワーク
# ===========================================
networks:
  it-supervisor-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
